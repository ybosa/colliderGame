<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Title</title>
</head>
<body>
<script type="module">
    import {initUIScript} from "./src/ui.js";
    initUIScript(); //also starts game.js
</script>

<div id="gameMenu" class="gameMenu">
    <button id="playButton">Play</button>
    <button id="settingsButton">
        Settings
    </button>
</div>

<div id="loseMenu" style="display: none;" class="gameMenu">
    <p>Game Over</p>
    <!--    <p>Score: <span id="scoreValue">0</span></p>-->
    <p>Speed: <span id="speedValue">0</span></p>
    <p>Coins Collected: <span id="coinsValue">0</span></p>
    <button id="restartButton">Restart</button>
    <button id="settingsButton2">
        Settings
    </button>
</div>

<div id="settingsMenu" style="display: none;" class="gameMenu">
    <H1>Settings</H1>
    <p>Graphics:</p>
    <div style="display: flex; gap: 1vw;">
        <button id="graphicsLowButton">Low</button>
        <button id="graphicsMediumButton">Medium</button>
        <button id="graphicsHighButton">High</button>
    </div>
    <p>Movement Sensitivity:</p>
    <input id="sensitivitySlider" type="range" min="0.1" max="2" step="0.1" value="1"/>
    <span id="sensitivityValue">1</span>

    <button id="gameMenuButton">
        Back
    </button>
</div>

<style>
    html {
        box-sizing: border-box;
        --button-selected-color: #ff0000; /* Default color for selected buttons */
    }

    *, *::before, *::after {
        box-sizing: inherit;
    }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .gameMenu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(0, 0, 0, 0.8);
        padding: 4vw;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 2vw;
        z-index: 10;
        color: white;
        text-align: center;
        font-size: 1.5vw;
        width: 30vw;
    }



    .gameMenu button {
        background-color: #007BFF;
        border: none;
        color: white;
        padding: 1vw 2vw;
        font-size: 1.2vw;
        cursor: pointer;
        border-radius: 5px;
    }

    .gameMenu button:hover {
        background-color: #0056b3;
    }
    @media (max-aspect-ratio: 1/1) {
        .gameMenu {
            font-size: 5vh;
            width: 90vw;
            padding: 6vw;
        }
        .gameMenu button {
            font-size: 5vh;
        }

    }

</style>
</body>
</html>
