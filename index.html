<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title</title>
</head>
<body>
<script type="module">
    import {startGame} from './src/game.js';

    document.getElementById('playButton').addEventListener('click', () => {
        document.getElementById('gameMenu').style.display = 'none';
        startGame();
    });

    document.getElementById('restartButton').addEventListener('click', () => {
        document.getElementById('loseMenu').style.display = 'none';
        startGame();
    });
    
    
</script>

<div id="gameMenu" class="gameMenu">
    <button id="playButton">Play</button>
    <button id="settingsButton"
            onclick="document.getElementById('gameMenu').style.display = 'none'; document.getElementById('settingsMenu').style.display = 'flex';">
        Settings
    </button>
</div>

<div id="loseMenu" style="display: none;" class="gameMenu">
    <p>Game Over</p>
<!--    <p>Score: <span id="scoreValue">0</span></p>-->
    <p>Speed: <span id="speedValue">0</span></p>
    <p>Coins Collected: <span id="coinsValue">0</span></p>
    <button id="restartButton">Restart</button>
    <button id="settingsButton2"
            onclick="document.getElementById('loseMenu').style.display = 'none'; document.getElementById('settingsMenu').style.display = 'flex';">
        Settings
    </button>
</div>

<div id="settingsMenu" style="display: none;" class="gameMenu">
    <button onclick="document.getElementById('settingsMenu').style.display = 'none'; document.getElementById('gameMenu').style.display = 'flex';">
        Back
    </button>

</div>


<style>
    html {
        box-sizing: border-box;
    }

    *, *::before, *::after {
        box-sizing: inherit;
    }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .gameMenu {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgba(0, 0, 0, 0.8);
        padding: 4vw;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 2vw;
        z-index: 10;
        color: white;
        text-align: center;
        font-size: 1.5vw;
        width: 30vw;
    }

    .gameMenu button {
        background-color: #007BFF;
        border: none;
        color: white;
        padding: 1vw 2vw;
        font-size: 1.2vw;
        cursor: pointer;
        border-radius: 5px;
    }

    .gameMenu button:hover {
        background-color: #0056b3;
    }
</style>
</body>
</html>
