<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title</title>
</head>
<body>
<script type="module">
    import {startGame,setGraphics,setSensitivity,setPaused} from './src/game.js';

    function highlightGraphicsButton(level) {
        const buttons = {
            low: document.getElementById('graphicsLowButton'),
            medium: document.getElementById('graphicsMediumButton'),
            high: document.getElementById('graphicsHighButton')
        };

        Object.keys(buttons).forEach(key => {
            if (key === level) {
                buttons[key].style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--button-selected-color');
            } else {
                buttons[key].style.backgroundColor = getComputedStyle(document.querySelector('.gameMenu button')).backgroundColor;
            }
        });
    }

    function loadCookies() {
        const cookies = document.cookie.split(';').reduce((acc, cookie) => {
            const [key, value] = cookie.split('=').map(c => c.trim());
            acc[key] = value;
            return acc;
        }, {});

        if (cookies.graphics) {
            setGraphics(cookies.graphics);
            highlightGraphicsButton(cookies.graphics)
        }
        if (cookies.sensitivity) {
            const sensitivity = parseFloat(cookies.sensitivity);
            setSensitivity(sensitivity);
            sensitivitySlider.value = sensitivity;
            sensitivityValue.textContent = sensitivity;
        }
    }


    function applyDefaultSettings() {
        if (!document.cookie.includes('graphics')) {
            setCookie('graphics', 'medium');
        }

        if (!document.cookie.includes('sensitivity')) {
            setCookie('sensitivity', 1);
        }
    }

    window.addEventListener('load', () => {
        applyDefaultSettings();
        loadCookies();
    });

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === null) {
            setPaused(true);
            document.getElementById('gameMenu').style.display = 'flex';
        }
    })


    function setCookie(fieldName, value) {
        document.cookie = `${fieldName}=${value}; path=/`;
    }




    document.getElementById('playButton').addEventListener('click', () => {
        document.getElementById('gameMenu').style.display = 'none';
        startGame();
    });

    document.getElementById('restartButton').addEventListener('click', () => {
        document.getElementById('loseMenu').style.display = 'none';
        startGame();
    });

    document.getElementById('graphicsLowButton').addEventListener('click', () => {
        setGraphics('low');
        setCookie('graphics', 'low');
        highlightGraphicsButton('low');
    });

    document.getElementById('graphicsMediumButton').addEventListener('click', () => {
        setGraphics('medium');
        setCookie('graphics', 'medium');
        highlightGraphicsButton('medium');
    });

    document.getElementById('graphicsHighButton').addEventListener('click', () => {
        setGraphics('high');
        setCookie('graphics', 'high');
        highlightGraphicsButton('high');
    });

    const sensitivitySlider = document.getElementById('sensitivitySlider');
    const sensitivityValue = document.getElementById('sensitivityValue');

    sensitivitySlider.addEventListener('input', () => {
        sensitivityValue.textContent = sensitivitySlider.value;
    });

    sensitivitySlider.addEventListener('change', () => {
        setSensitivity(parseFloat(sensitivitySlider.value));
        setCookie('sensitivity', sensitivitySlider.value);
    });



</script>

<div id="gameMenu" class="gameMenu">
    <button id="playButton">Play</button>
    <button id="settingsButton"
            onclick="document.getElementById('gameMenu').style.display = 'none'; document.getElementById('settingsMenu').style.display = 'flex';">
        Settings
    </button>
</div>

<div id="loseMenu" style="display: none;" class="gameMenu">
    <p>Game Over</p>
<!--    <p>Score: <span id="scoreValue">0</span></p>-->
    <p>Speed: <span id="speedValue">0</span></p>
    <p>Coins Collected: <span id="coinsValue">0</span></p>
    <button id="restartButton">Restart</button>
    <button id="settingsButton2"
            onclick="document.getElementById('loseMenu').style.display = 'none'; document.getElementById('settingsMenu').style.display = 'flex';">
        Settings
    </button>
</div>

<div id="settingsMenu" style="display: none;" class="gameMenu">
    <H1>Settings</H1>
    <p>Graphics:</p>
    <div style="display: flex; gap: 1vw;">
        <button id="graphicsLowButton">Low</button>
        <button id="graphicsMediumButton">Medium</button>
        <button id="graphicsHighButton">High</button>
    </div>
    <p>Movement Sensitivity:</p>
    <input id="sensitivitySlider" type="range" min="0.1" max="2" step="0.1" value="1"/>
    <span id="sensitivityValue">1</span>

    <button onclick="document.getElementById('settingsMenu').style.display = 'none'; document.getElementById('gameMenu').style.display = 'flex';">
        Back
    </button>



</div>


<style>
    html {
        box-sizing: border-box;
        --button-selected-color: #ff0000; /* Default color for selected buttons */
    }

    *, *::before, *::after {
        box-sizing: inherit;
    }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .gameMenu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(0, 0, 0, 0.8);
        padding: 4vw;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 2vw;
        z-index: 10;
        color: white;
        text-align: center;
        font-size: 1.5vw;
        width: 30vw;
    }

    .gameMenu button {
        background-color: #007BFF;
        border: none;
        color: white;
        padding: 1vw 2vw;
        font-size: 1.2vw;
        cursor: pointer;
        border-radius: 5px;
    }

    .gameMenu button:hover {
        background-color: #0056b3;
    }
</style>
</body>
</html>
